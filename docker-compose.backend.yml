# Backend + DB only (for frontend local dev with `npm run dev`)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://taskuser:taskpass@postgres:5432/taskdb?sslmode=disable
      DATABASE_POOLER_URL: postgres://taskuser:taskpass@postgres:5432/taskdb?sslmode=disable
      JWT_SECRET: local-dev-secret-change-in-prod
      PORT: "8080"
      ENV: development
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
